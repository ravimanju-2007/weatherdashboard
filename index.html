<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading" class="spinner-container">
        <div class="spinner"></div>
    </div>

    <div class="dashboard-grid">
        
        <aside id="current-panel" class="panel left-panel day-clear">
            <div class="panel-header">LOCAL WEATHER REPORT</div>
            <div class="panel-body">
                <p class="subtitle">Your Local Weather</p>
                <h2 id="location-title" class="location-name">Loading...</h2>
                
                <div class="main-temp-container">
                    <span id="current-temp" class="main-temp">--°C</span>
                </div>

                <div class="weather-condition">
                    <span id="current-icon" class="condition-icon">☀️</span>
                    <p id="current-desc" class="condition-text">Clear Sky</p>
                </div>

                <div class="weather-stats">
                    <div>Humidity: <span id="humidity">--</span>%</div>
                    <div>Wind: <span id="wind-speed">--</span> km/h</div>
                </div>
            </div>
        </aside>

        <main class="center-panel">
            <div class="panel chart-panel">
                <div class="panel-header">24-HOUR TEMPERATURE TREND</div>
                <div class="canvas-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>

            <div class="panel city-panel">
                <div class="panel-header city-header">
                    <span>CITY SEARCH</span>
                    <div class="search-box">
                        <input type="text" id="city-search" placeholder="Type city name..." autocomplete="off">
                        <div id="search-suggestions" class="suggestions-list"></div>
                    </div>
                </div>
                <div class="city-list">
                    <div class="city-row"><span>New York</span><span class="city-temp">45°C</span></div>
                    <div class="city-row active"><span>Los Angeles</span><span class="city-temp">35°C</span></div>
                    <div class="city-row"><span>Houston</span><span class="city-temp">12°C</span></div>
                    <div class="city-row"><span>Philadelphia</span><span class="city-temp">28°C</span></div>
                </div>
            </div>
        </main>

        <section class="right-panel">
            <div class="panel forecast-wrapper">
                <div class="panel-header">7-DAY FORECAST (CLICK TO EXPAND)</div>
                <div id="forecast-grid" class="forecast-grid">
                    </div>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
